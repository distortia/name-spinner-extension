<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Name Spinner</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <section class="add-section">
      <input type="text" id="name-input" placeholder="Add a name" />
      <button type="button" id="add-btn">Add</button>
    </section>
    <section class="list-section">
      <div class="list-section-header">
        <h3>Names</h3>
        <div class="list-section-header-actions">
          <button type="button" id="list-collapse-btn" class="list-collapse-btn" aria-expanded="true" aria-controls="list-section-content" aria-label="Collapse names list">
            <span class="list-collapse-icon" aria-hidden="true">▼</span>
          </button>
          <button type="button" id="import-btn" class="import-btn">
            <svg class="import-btn-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Import names
          </button>
        </div>
      </div>
      <div id="list-section-content" class="list-section-content">
        <div id="import-panel" class="import-panel hidden">
          <p class="import-hint">Paste names below (one per line or comma-separated)</p>
          <textarea id="import-textarea" class="import-textarea" rows="4" placeholder="Alice&#10;Bob&#10;Carol"></textarea>
          <div class="import-actions">
            <button type="button" id="import-replace-btn" class="import-replace-btn">Replace list</button>
            <button type="button" id="import-cancel-btn" class="import-cancel-btn">Cancel</button>
          </div>
        </div>
        <ul id="name-list"></ul>
        <p id="empty-msg" class="empty-msg hidden">Add names above or import a list to get started.</p>
      </div>
    </section>
    <section class="wheel-section">
      <div class="mode-tabs" role="tablist" aria-label="Pick mode">
        <button type="button" id="tab-slot" class="mode-tab" role="tab" aria-selected="true" aria-controls="panel-slot" data-mode="slot">Slot</button>
        <button type="button" id="tab-battle" class="mode-tab" role="tab" aria-selected="false" aria-controls="panel-battle" data-mode="battle">Battle</button>
        <button type="button" id="tab-hunt" class="mode-tab" role="tab" aria-selected="false" aria-controls="panel-hunt" data-mode="hunt">Duck Hunt</button>
        <button type="button" id="tab-plinko" class="mode-tab" role="tab" aria-selected="false" aria-controls="panel-plinko" data-mode="plinko">Plinko</button>
      </div>
      <div id="panel-slot" class="tab-panel" role="tabpanel" aria-labelledby="tab-slot">
        <div class="slot-machine-wrapper">
          <div class="slot-machine">
            <div class="scroller-viewport">
              <div class="slot-payline slot-payline--top" aria-hidden="true"></div>
              <div class="slot-payline slot-payline--bottom" aria-hidden="true"></div>
              <div id="scroller-strip" class="scroller-strip"></div>
            </div>
          </div>
          <button type="button" id="lever-btn" class="slot-lever" aria-label="Pull lever to spin" disabled>
            <span class="slot-lever__bar"></span>
          </button>
        </div>
        <button type="button" id="spin-btn" class="rainbow-button" disabled>Spin</button>
      </div>
      <div id="panel-battle" class="tab-panel hidden" role="tabpanel" aria-labelledby="tab-battle" aria-hidden="true">
        <div class="battle-arena-wrapper">
          <canvas id="battle-canvas" width="320" height="200" aria-label="Battle arena"></canvas>
        </div>
        <div id="battle-legend" class="battle-legend" aria-label="Players and their colors"></div>
        <button type="button" id="battle-btn" class="rainbow-button battle-btn" disabled>Battle</button>
      </div>
      <div id="panel-hunt" class="tab-panel hidden" role="tabpanel" aria-labelledby="tab-hunt" aria-hidden="true">
        <div class="hunt-arena-wrapper">
          <canvas id="hunt-canvas" width="320" height="200" aria-label="Duck Hunt arena"></canvas>
        </div>
        <p class="hunt-instruction">Watch — last duck wins in ~10s.</p>
        <button type="button" id="hunt-btn" class="rainbow-button hunt-btn" disabled>Hunt</button>
      </div>
      <div id="panel-plinko" class="tab-panel hidden" role="tabpanel" aria-labelledby="tab-plinko" aria-hidden="true">
        <div class="plinko-arena-wrapper">
          <canvas id="plinko-canvas" width="320" height="280" aria-label="Plinko board"></canvas>
        </div>
        <p class="plinko-instruction">Drop the ball — it bounces through pegs into a name slot.</p>
        <button type="button" id="plinko-btn" class="rainbow-button plinko-btn" disabled>Drop</button>
      </div>
      <div id="result" class="result hidden" aria-live="polite" aria-atomic="true"></div>
      <div id="winner-history" class="winner-history hidden">
        <h4 class="winner-history__title">Recent</h4>
        <div id="winner-history-list" class="winner-history-list"></div>
      </div>
      <div id="stats" class="stats hidden">
        <h4 class="stats__title">Times picked</h4>
        <ul id="stats-list" class="stats-list"></ul>
      </div>
      <button type="button" id="clear-history-btn" class="clear-history-btn hidden" aria-label="Clear history and stats">Clear history & stats</button>
    </section>
  </div>
  <div id="confetti-container" class="confetti-container" aria-hidden="true"></div>
  <script src="popup.js"></script>
</body>
</html>
